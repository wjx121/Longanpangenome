[General]
job_type        = local
job_prefix      = nextPolish
task            = best
rewrite         = yes
deltmp          = yes
rerun           = 3
parallel_jobs   = 20
multithread_jobs = 6
genome          = /work/genome.fasta
genome_size     = auto
workdir         = /work/
polish_options  = -p {multithread_jobs}

[sgs_option]
sgs_fofn        = ./sgs.fofn
sgs_options     = -max_depth 60