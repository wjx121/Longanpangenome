[General]
job_type        = slurm
job_prefix      = nextDenovo
task            = all
rewrite         = yes
deltmp          = yes
rerun           = 3
parallel_jobs   = 20
input_type      = fastq
read_type       = ont
input_fofn      = /work/input.fofn
workdir         = /work/

[correct_option]
read_cutoff         = 1k
genome_size         = ${genome size}
pa_correction       = 2
sort_options        = -m 2g -t 6
minimap2_options_raw = -t 6 -x map-ont
correction_options  = -p 15

[assemble_option]
minimap2_options_cns = -t 6 -x map-ont